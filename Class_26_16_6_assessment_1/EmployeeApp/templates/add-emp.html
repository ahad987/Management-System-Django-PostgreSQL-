{% extends 'inc/base.html' %}

{% include 'inc/nav.html' %}
{% block main_body %}
<h2>Add New Employee</h2>
<form action="" method="POST" enctype="multipart/form-data">
    {% csrf_token %}

    <label>Name</label>
    <input type="text" id="first_name," name="name" placeholder="name..." />

    <label>Email</label>
    <input type="email" id="last_name," name="email" placeholder="email..." />

    <label>Phone</label>
    <input type="text" id="last_name," name="phone" placeholder="phone..." />

    <label>Department</label>
    <input type="text" id="first_name," name="department" placeholder="department..." />

    <label>Salary</label>
    <input type="text" id="last_name," name="salary" placeholder="salary..." />

    <input type="submit" value="Submit" />
  </form>
{% endblock main_body %}
