{% extends 'inc/base.html' %}

{% include 'inc/nav.html' %}
{% block main_body %}
<h2>Edit Employee</h2>
<form action="" method="POST" enctype="multipart/form-data">
    {% csrf_token %}

    <label>Name</label>
    <input type="text" id="first_name," name="name" value="{{data.name}}" />

    <label>Email</label>
    <input type="email" id="last_name," name="email" value="{{data.email}}" />

    <label>Phone</label>
    <input type="text" id="last_name," name="phone" value="{{data.phone}}" />

    <label>Department</label>
    <input type="text" id="first_name," name="department" value="{{data.department}}" />

    <label>Salary</label>
    <input type="text" id="last_name," name="salary" value="{{data.salary}}" />

    <input type="submit" value="Submit" />
  </form>
{% endblock main_body %}
