<style>
    /* Core Styling Rules & Visual Variables */
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

:root {
  --primary: #4f46e5;
  --primary-dark: #4338ca;
  --bg-main: #ffffff;
  --bg-alt: #f9fafb;
  --text-dark: #111827;
  --text-muted: #4b5563;
  --border: #e5e7eb;
}

body {
  background-color: var(--bg-main);
  color: var(--text-dark);
  line-height: 1.6;
}

/* Flexbox Layout Navigation Bar */
.navbar {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  background: rgba(255, 255, 255, 0.95);
  backdrop-filter: blur(8px);
  border-bottom: 1px solid var(--border);
  z-index: 1000;
}

.nav-container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 16px 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  font-size: 22px;
  font-weight: 700;
  color: var(--text-dark);
  text-decoration: none;
}

.logo span {
  color: var(--primary);
}

.nav-links {
  display: flex;
  list-style: none;
  gap: 32px;
}

.nav-links a {
  text-decoration: none;
  color: var(--text-muted);
  font-weight: 500;
  font-size: 15px;
  transition: color 0.2s ease;
}

.nav-links a:hover, .nav-links a.active {
  color: var(--primary);
}

.nav-actions {
  display: flex;
  align-items: center;
  gap: 16px;
}

/* Flexible Layout Hero Section */
.hero {
  background: radial-gradient(circle at 80% 20%, rgba(79, 70, 229, 0.05) 0%, transparent 50%), var(--bg-alt);
  padding: 180px 24px 100px;
  text-align: left;
}

.hero-container {
  max-width: 800px;
  margin: 0 auto;
}

.hero h1 {
  font-size: 48px;
  font-weight: 800;
  letter-spacing: -1px;
  line-height: 1.2;
  margin-bottom: 20px;
}

.hero p {
  font-size: 18px;
  color: var(--text-muted);
  margin-bottom: 36px;
}

.hero-buttons {
  display: flex;
  justify-content: center;
  gap: 16px;
}

/* Three-Column CSS Grid Features Section */
.features {
  padding: 100px 24px;
}

.section-container {
  max-width: 1200px;
  margin: 0 auto;
}

.section-header {
  text-align: center;
  max-width: 600px;
  margin: 0 auto 60px;
}

.section-header h2 {
  font-size: 36px;
  font-weight: 700;
  margin-bottom: 16px;
}

.section-header p {
  color: var(--text-muted);
  font-size: 16px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 32px;
}

.card {
  background: var(--bg-main);
  padding: 32px;
  border-radius: 12px;
  border: 1px solid var(--border);
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.card:hover {
  transform: translateY(-4px);
  box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
}

.card-icon {
  font-size: 32px;
  margin-bottom: 20px;
}

.card h3 {
  font-size: 20px;
  margin-bottom: 12px;
}

.card p {
  color: var(--text-muted);
  font-size: 15px;
}

/* Button UI Components */
.btn-primary, .btn-secondary, .btn-outline {
  display: inline-block;
  text-decoration: none;
  padding: 10px 20px;
  border-radius: 6px;
  font-size: 14px;
  font-weight: 600;
  transition: all 0.2s ease;
}

.btn-primary {
  background-color: var(--primary);
  color: white;
}

.btn-primary:hover {
  background-color: var(--primary-dark);
}

.btn-secondary {
  color: var(--text-muted);
}

.btn-secondary:hover {
  color: var(--text-dark);
}

.btn-outline {
  background: transparent;
  color: var(--text-dark);
  border: 1px solid var(--border);
}

.btn-outline:hover {
  background: var(--border);
}

.btn-large {
  padding: 14px 28px;
  font-size: 16px;
}

/* Footer Section Layout */
.footer {
  border-top: 1px solid var(--border);
  background: var(--bg-alt);
  padding: 40px 24px;
}

.footer-container {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 14px;
  color: var(--text-muted);
}

.footer-links {
  display: flex;
  gap: 24px;
}

.footer-links a {
  color: var(--text-muted);
  text-decoration: none;
}

.footer-links a:hover {
  color: var(--text-dark);
}

/* Mobile Media Queries Optimization */
@media (max-width: 768px) {
  .nav-links, .nav-actions {
    display: none; /* Hide default navigation links for simplified mobile layout */
  }
  .hero h1 {
    font-size: 32px;
  }
  .hero-buttons {
    flex-direction: column;
  }
  .footer-container {
    flex-direction: column;
    gap: 16px;
    text-align: center;
  }
}

.button {
  border: none;
  color: white;
  padding: 15px 32px;
