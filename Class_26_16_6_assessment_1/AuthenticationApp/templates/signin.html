<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In</title>
  <style>
    /* Reset basic styles and define uniform theme variables */
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

:root {
  --primary-color: #4f46e5;
  --primary-hover: #4338ca;
  --background-color: #f3f4f6;
  --card-background: #ffffff;
  --text-main: #1f2937;
  --text-muted: #6b7280;
  --border-color: #d1d5db;
}

/* Center viewport centering */
body {
  background-color: var(--background-color);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
}

/* Auth Container Form Card */
.auth-container {
  background: var(--card-background);
  padding: 40px;
  border-radius: 12px;
  box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
  width: 100%;
  max-width: 400px;
}

.auth-container h2 {
  color: var(--text-main);
  font-size: 28px;
  font-weight: 700;
  margin-bottom: 6px;
}

.auth-container .subtitle {
  color: var(--text-muted);
  font-size: 14px;
  margin-bottom: 24px;
}

/* Vertical Stack Input Handling */
.input-group {
  margin-bottom: 20px;
  display: flex;
  flex-direction: column;
}

.input-group label {
  color: var(--text-main);
  font-size: 14px;
  font-weight: 500;
  margin-bottom: 6px;
}

.input-group input {
  padding: 12px 16px;
  border: 1px solid var(--border-color);
  border-radius: 6px;
  font-size: 15px;
  outline: none;
  transition: border-color 0.2s ease, box-shadow 0.2s ease;
}

.input-group input:focus {
  border-color: var(--primary-color);
  box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
}

/* Form Action Layout Row (Checkbox + Forgot Link) */
.form-actions {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 24px;
}

.checkbox-group {
  display: flex;
  align-items: center;
  gap: 8px;
}

.checkbox-group input {
  accent-color: var(--primary-color);
  cursor: pointer;
  width: 16px;
  height: 16px;
}

.checkbox-group label {
  font-size: 14px;
  color: var(--text-muted);
  user-select: none;
}

/* Link Actions Styles */
.forgot-link, .redirect-link a {
  color: var(--primary-color);
  text-decoration: none;
  font-size: 14px;
  font-weight: 500;
}

.forgot-link:hover, .redirect-link a:hover {
  text-decoration: underline;
}

/* Full Width Submit Block */
.auth-btn {
  background-color: var(--primary-color);
  color: #ffffff;
  border: none;
  padding: 14px;
  width: 100%;
  border-radius: 6px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: background-color 0.2s ease;
}

.auth-btn:hover {
  background-color: var(--primary-hover);
}

/* Bottom Text Setup */
.redirect-link {
  text-align: center;
  margin-top: 24px;
  font-size: 14px;
  color: var(--text-muted);
}

  </style>
</head>
<body>
  <div class="auth-container">
    <h2>Welcome Back</h2>
    <p class="subtitle">Please enter your details to sign in.</p>
    
    <form action="#" method="POST">
        {% csrf_token %}
      <div class="input-group">
        <label for="username">Username</label>
        <input type="text" id="email" name="username" placeholder="Enter your username" required>
      </div>
      
      <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" required>
      </div>
      
      <div class="form-actions">
        <div class="checkbox-group">
          <input type="checkbox" id="remember">
          <label for="remember">Remember me</label>
        </div>
        <a href="#" class="forgot-link">Forgot password?</a>
      </div>
      
      <button type="submit" class="auth-btn">Sign In</button>
    </form>
    
    <p class="redirect-link">Don't have an account? <a href="{% url 'singup' %}">Sign up</a></p>
  </div>
</body>
</html>
