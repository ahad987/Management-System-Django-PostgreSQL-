<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up Form</title>
  <style>
    /* Reset basic styles and define variables */
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

:root {
  --primary-color: #4f46e5;
  --primary-hover: #4338ca;
  --background-color: #f3f4f6;
  --card-background: #ffffff;
  --text-main: #1f2937;
  --text-muted: #6b7280;
  --border-color: #d1d5db;
}

/* Center the signup card in the middle of the screen */
body {
  background-color: var(--background-color);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
}

/* Main Form Card */
.signup-container {
  background: var(--card-background);
  padding: 40px;
  border-radius: 12px;
  box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
  width: 100%;
  max-width: 400px;
}

.signup-container h2 {
  color: var(--text-main);
  font-size: 28px;
  font-weight: 700;
  margin-bottom: 6px;
}

.signup-container .subtitle {
  color: var(--text-muted);
  font-size: 14px;
  margin-bottom: 24px;
}

/* Individual Form Fields */
.input-group {
  margin-bottom: 20px;
  display: flex;
  flex-direction: column;
}

.input-group label {
  color: var(--text-main);
  font-size: 14px;
  font-weight: 500;
  margin-bottom: 6px;
}

.input-group input {
  padding: 12px 16px;
  border: 1px solid var(--border-color);
  border-radius: 6px;
  font-size: 15px;
  outline: none;
  transition: border-color 0.2s ease, box-shadow 0.2s ease;
}

/* Visual feedback on focus */
.input-group input:focus {
  border-color: var(--primary-color);
  box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
}

/* Terms and Conditions Checkbox Alignment */
.checkbox-group {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 24px;
}

.checkbox-group input {
  accent-color: var(--primary-color);
  cursor: pointer;
  width: 16px;
  height: 16px;
}

.checkbox-group label {
  font-size: 14px;
  color: var(--text-muted);
}

.checkbox-group a, .login-link a {
  color: var(--primary-color);
  text-decoration: none;
  font-weight: 500;
}

.checkbox-group a:hover, .login-link a:hover {
  text-decoration: underline;
}

/* Submit Button Layout */
.signup-btn {
  background-color: var(--primary-color);
  color: #ffffff;
  border: none;
  padding: 14px;
  width: 100%;
  border-radius: 6px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: background-color 0.2s ease;
}

.signup-btn:hover {
  background-color: var(--primary-hover);
}

/* Redirect text at the bottom */
.login-link {
  text-align: center;
  margin-top: 24px;
  font-size: 14px;
  color: var(--text-muted);
}

  </style>
</head>
<body>
  <div class="signup-container">
    <h2>Create Account</h2>
    <p class="subtitle">It's quick and easy.</p>
    
    <form action="#" method="POST">
        {% csrf_token %}
      <div class="input-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Enter username" required>
      </div>
      
      <div class="input-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="name@example.com" required>
      </div>
      
      <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Create a password" required>
      </div>

      <div class="input-group">
        <label for="password">Confirm Password</label>
        <input type="password" id="password" name="password2" placeholder="Confirm password" required>
      </div>
      
      <div class="checkbox-group">
        <input type="checkbox" id="terms" required>
        <label for="terms">I agree to the <a href="#">Terms & Conditions</a></label>
      </div>
      
      <button type="submit" class="signup-btn">Sign Up</button>
    </form>
    
    <p class="login-link">Already have an account? <a href="{% url 'signin' %}">Sign in</a></p>
  </div>
</body>
</html>
